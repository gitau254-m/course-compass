<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="any" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- App Title & Description — optimized for Google -->
  <title>KCSE Course Checker Kenya 2024 | Find University Courses You Qualify For</title>

    content="Free KCSE course checker for Kenyan students. Calculate your cluster scores and instantly find every university degree and diploma course you qualify for based on 2024 KUCCPS cutoff points. Supports M-Pesa payment." />

  <meta name="keywords"
    content="KCSE course checker, KUCCPS 2024 cutoff points, cluster score calculator Kenya, university courses Kenya, KCSE eligibility checker, KUCCPS placement Kenya, KCSE cluster score, university admission Kenya, diploma courses Kenya, degree courses KUCCPS, check KCSE courses, KUCCPS 2024, form four courses Kenya" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://course-compass-guide.vercel.app/" />

  <!-- Geo targeting Kenya -->
  <meta name="geo.region" content="KE" />
  <meta name="geo.country" content="Kenya" />
  <meta name="language" content="English" />

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#006600" />

  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Open Graph (WhatsApp, Facebook previews) -->
  <meta property="og:title" content="KCSE Course Checker Kenya 2024 | Find University Courses You Qualify For" />
  <meta property="og:description"
    content="Calculate your KCSE cluster scores and find every university and diploma course you qualify for. Based on 2024 KUCCPS cutoff points. Pay via M-Pesa." />

  <meta property="og:url" content="https://course-compass-guide.vercel.app/" />

  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_KE" />
  <meta property="og:site_name" content="KCSE Course Checker Kenya" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="KCSE Course Checker Kenya 2024" />
  <meta name="twitter:description"
    content="Find every university course you qualify for based on your KCSE grades and 2024 KUCCPS cutoff points." />
  <meta name="twitter:image" content="https://course-compass-guide.vercel.app/og-image.png" />

  <!-- Structured Data — helps Google understand what this app is -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "KCSE Course Checker Kenya",
    "url": "https://course-compass-guide.vercel.app/",
    "description": "Free tool for Kenyan KCSE students to calculate cluster scores and find university and diploma courses they qualify for based on 2024 KUCCPS cutoff points.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "99",
      "priceCurrency": "KES"
    },
    "author": {
      "@type": "Person",
      "name": "Wallace Gitau"
    },
    "keywords": "KCSE, KUCCPS, course checker, Kenya, university admission, cluster score",
    "inLanguage": "en-KE",
    "audience": {
      "@type": "Audience",
      "audienceType": "Kenyan KCSE students"
    }
  }
  </script>

  <!-- PWA install prompt capture — must be here before React loads -->
  <script>
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
    });
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
